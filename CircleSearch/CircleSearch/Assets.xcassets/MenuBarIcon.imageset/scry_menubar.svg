<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Menu bar icons should be monochrome and template-rendered by macOS -->
  <!-- We use solid black; macOS will recolor based on dark/light menu bar -->

  <!-- Lens ring -->
  <circle cx="16" cy="16" r="9" 
          fill="none" 
          stroke="#000000" 
          stroke-width="2"/>

  <!-- Central sparkle: four-pointed star -->
  <path d="
    M 16 11
    L 17 15
    L 21 16
    L 17 17
    L 16 21
    L 15 17
    L 11 16
    L 15 15
    Z
  " fill="#000000"/>
</svg>
